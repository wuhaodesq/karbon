# Phase 2 · Infant Exploration (婴儿探索)
# Continued from Phase 1. Non-structural upgrades only (safe to resume).
#
# Changes from Phase 0/1:
#   - batch_size: 2048 (2× �?more stable gradients)
#   - parallel envs: 4 (4× �?more diverse experience)
#   - replay GPU: 8192 (2× �?more on-device rehearsal)
#   - skill GPU: 512 (2× �?more hot skills)
#   - num_objects: 5 (more to count with NumberSense)
#
# Model structure unchanged: SlotAttention(7) + TTT-Hybrid(2 layers, 128 dim)
# Model grows via ModelGrowerV2 (enabled, max_layers: 20)

stage: 2
phase: 2
name: "phase2_infant_exploration"

# Count-based exploration bonus: a *state-dependent* floor on the reward
# signal so 3D cannot deadlock when env reward is sparse. Top-level
# key so enabling it does NOT switch on RND / change curiosity mode.
exploration_bonus:
  enabled: true
  coef: 0.5             # reverted: 0.2 was a regression (mean_ret fell to 99.5 vs 100.8 at 0.5); bonus is reward signal, not just entropy pin
  grid: 8               # obs downsampled to grid x grid before hashing
  capacity: 65536        # fixed hash-bucket count (Axiom 1)

model:
  use_hybrid_backbone: true
  hybrid_n_layers: 2
  hybrid_n_heads: 4
  hybrid_swa_window: 8
  hybrid_ttt_mini_batch: 4
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0
  hidden_size: 128
  use_slot_attention: true
  slot_num_slots: 7
  slot_dim: 128
  slot_num_iterations: 3
  use_vision_encoder: false

env:
  id: "PhysicsSandbox"
  num_objects: 10
  max_episode_steps: 300
  render_size: 64
  gravity: -9.8
  action_force: 50.0

train:
  ppo_clip: 0.2
  ppo_epochs: 6
  entropy_coef: 0.015   # reverted: 0.008 was a regression; 0.015 plateaued higher (100.8-101.1)
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 3.0e-4
  total_steps: 13000000   # extended headroom past 11M so resume doesn't auto-stop at plateau

curiosity:
  enabled: true
  mode: "rssm_uncertainty"
  coef: 0.8

world_model:
  enabled: true
  embed_dim: 128
  h_dim: 128
  z_dim: 32
  hidden: 128
  max_rollout_steps: 4
  lr: 3.0e-3
  update_every_steps: 4
  reward_loss_weight: 1.0
  log_every_steps: 5000

replay:
  enabled: true
  capacity_gpu: 8192
  capacity_cpu: 65536
  capacity_ssd: 73728
  min_size: 256
  batch_size: 256
  per_alpha: 0.8
  sample_every_steps: 4

coverage:
  num_buckets: 4096
  log_every_steps: 5000

skills:
  enabled: true
  gpu_capacity: 512
  cpu_capacity: 4096
  cold_shard_size: 128
  cold_max_shards: 64
  merge_threshold: 0.75
  extraction_reward_threshold: 0.05

number_sense:
  enabled: true
  max_count: 10
  train_every_episodes: 10
  lr: 3.0e-4

rule_induction:
  enabled: true
  max_rules: 128
  induction_every_episodes: 20

causal_discovery:
  enabled: true
  max_edges: 256
  intervene_every_steps: 500

model_growth:
  enabled: true
  max_layers: 20
  min_steps_between_growths: 1000000   # space growths 1M apart so each benefit materializes before the next
  grow_trigger_coverage: 0.15          # lowered from 0.3: raw-obs hash undercounts exploration after 9M steps
  distill_steps: 400                   # non-disruptive: train only new block on real data -> needs enough steps
  distill_lr: 1e-3
  distill_batch: 1024                  # how many real replay obs to sample for identity distillation

cross_modal:
  enabled: true
  touch_dim: 6
  plan_dim: 128
  lang_dim: 3584
  train_every_steps: 1000

creativity:
  enabled: true
  trigger_every_steps: 2000
  max_ideas: 200

developmental_memory:
  enabled: true
  episodic_max: 10000
  semantic_max: 1000
  autobiographical_max: 500000000
  surprise_threshold: 0.01
  consolidation_every_steps: 50000

theory_of_mind:
  enabled: true

homeostatic_drives:
  enabled: true

# MCTS planner disabled: Stage-3 v8 (planner ON) plateaued at mean_ret 101.6,
# while v9 (planner OFF, same 7-layer ckpt) converged to 103.8 (+2.2, slope->0
# over ~200k steps). Imperfect-WM plan picks + PPO gradient/behavior decoupling
# drag steady-state down. Keep OFF.
long_range_planner:
  enabled: false
  max_depth: 10
  max_nodes: 500
  num_simulations: 50
  plan_every_steps: 500

emotion_system:
  enabled: true

concept_graph:
  enabled: true
  max_nodes: 1000
  max_edges: 5000

metacognition_v2:
  reflection_enabled: true
  clustering_enabled: true

iq_boost:
  enabled: true

abstract_reasoning:
  enabled: true

tier2_cognitive:
  enabled: true

neuro_symbolic_bridge:
  enabled: true

program_synthesis:
  enabled: true
  test_every_steps: 2000
  max_patterns: 100
  min_occurrences: 3

# Counterfactual planner disabled: same reason as long_range_planner above —
# Stage-3 v8 showed planning overriding PPO actions drags steady-state (101.6 vs
# 103.8 without). Keep OFF until the world model is accurate enough to trust.
counterfactual_planner:
  enabled: false
  num_candidates: 5
  max_imagine_steps: 8

marginal_gains:
  enabled: true

visual_analyzer:
  enabled: true

monitor:
  sample_interval_s: 2.0
  slope_alarm_gb_per_hour: 0.5
