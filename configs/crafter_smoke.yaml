# Crafter smoke — feasibility probe: does the devagi backbone (7-layer hybrid
# + SlotAttention + RSSM world model + bounded skill library) transfer to an
# open-world survival sandbox (Crafter) without code changes beyond the env
# branch? Fresh model (Crafter has 17 actions vs PhysicsSandbox 8, so the
# policy head cannot resume). Obs is (64,64,3) uint8 — same shape as
# PhysicsSandbox, so the vision front-end is unchanged.
#
# This is a PROBE, not a training run. total_steps kept small.

stage: 4
name: "crafter_smoke"

env:
  id: "Crafter"
  max_episode_steps: 500

model:
  use_hybrid_backbone: true
  hidden_size: 128
  hybrid_n_layers: 7
  hybrid_n_heads: 4
  hybrid_swa_window: 16
  hybrid_ttt_mini_batch: 8
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0
  use_slot_attention: true
  slot_num_slots: 7
  slot_dim: 128
  slot_num_iterations: 3
  use_vision_encoder: false

skills:
  skill_d_out: 128
  skill_d_in: 128
  skill_rank: 8
  gpu_capacity: 256
  cpu_capacity: 2048
  ssd_max_shards: 64
  ssd_shard_size: 128
  merge_similarity_threshold: 0.9
  score_alpha: 1.0
  score_beta: 0.5
  score_gamma: 0.1
  archive_subdir: "skills"

world_model:
  z_dim: 32
  h_dim: 64
  embed_dim: 64
  hidden: 128
  max_rollout_steps: 10
  kl_free_nats: 1.0
  update_every_steps: 8
  lr: 3.0e-4
  wm_loss_coef: 1.0
  log_every_steps: 5000

curiosity:
  mode: "rssm_uncertainty"
  coef: 0.3

imagination:
  enabled: true
  imagination_horizon: 8
  imagination_batch: 32
  discount: 0.99
  actor_entropy_scale: 0.01
  critic_loss_scale: 0.5
  update_every_steps: 16
  min_replay_size: 256
  lambda_gae: 0.95
  lr: 3.0e-4

model_growth:
  enabled: false

intrinsic:
  embed_dim: 128
  lr: 1.0e-4
  reward_clip: 5.0
  reward_coef: 0.1
  update_every_steps: 1

replay:
  hot_capacity: 4096
  warm_capacity: 32728
  cold_max_shards: 8
  cold_shard_size: 4096
  per_alpha: 0.6
  min_size_to_sample: 1024
  sample_every_steps: 4
  batch_size_offpolicy: 128
  archive_subdir: "replay"

coverage:
  num_buckets: 4096
  log_every_steps: 5000

train:
  total_steps: 3000
  ppo_clip: 0.2
  ppo_epochs: 4
  entropy_coef: 0.01
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
