# Stage 7 · 3D Cognitive Birth (3D注入 + 码本扩容)
# The developmental transition from 2D PhysicsSandbox to ThreeDWorld.
# Resumes from Stage 6 ckpt; applies GrepVAE latent expansion 32→64
# before training begins so the agent encounters "cognitive earthquake".
#
# Architecture: unchanged from Stage 6 (7-layer hybrid + SlotAttention +
#   RSSM + bounded skill library). Only the environment changes.

stage: 7
name: "stage7_3d_birth"

model:
  hidden_size: 128
  use_hybrid_backbone: true
  hybrid_n_layers: 7
  hybrid_n_heads: 4
  hybrid_swa_window: 16
  hybrid_ttt_mini_batch: 8
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0
  use_slot_attention: true
  slot_num_slots: 7
  slot_dim: 128
  slot_num_iterations: 3
  use_vision_encoder: false

# ThreeDWorld with 64×64 render to match Stage 6 model input shape.
# n_envs=1 preserves the developmental single-agent path.
env:
  id: "ThreeDWorld"
  num_objects: 10
  max_episode_steps: 300
  render_size: 64
  action_force: 50.0
  developmental_age: 0.0
  num_envs: 1

# Stage 7 sub-block: expanded Generative Replay VAE
# latent_dim doubled (32→64) via warm-start expansion at launch.
# Reset kl_weight to neutral after expansion to let new dims adapt.
continual:
  ewc_lambda: 1.0
  ewc_gamma: 0.95
  ewc_anchor_mode: "replace"
  ewc_anchor_ema_alpha: 0.9
  ewc_consolidate_every_steps: 100000
  ewc_consolidate_num_batches: 32
  ewc_batch_size: 32

  gr_enabled: true
  gr_latent_dim: 64          # expanded from Stage 6's 32
  gr_hidden: 128
  gr_lr: 1.0e-3
  gr_kl_weight: 1.0
  gr_update_every_steps: 16
  gr_batch_size: 32
  gr_rehearsal_batch_size: 32
  gr_inject_every_steps: 5000

  sleep_warmup_steps: 1000
  sleep_replay_trim_every: 10000
  sleep_skills_merge_every: 20000
  sleep_ttt_distill_every: 20000

core_knowledge_loss:
  enabled: true
  coef_object_permanence: 0.1
  coef_intuitive_physics: 0.1
  coef_number_sense: 0.1

imagination:
  enabled: true
  imagination_horizon: 8
  imagination_batch: 32
  discount: 0.99
  actor_entropy_scale: 0.01
  critic_loss_scale: 0.5
  update_every_steps: 16
  min_replay_size: 256
  lambda_gae: 0.95
  lr: 3.0e-4

homeostatic_drives:
  enabled: true
  curiosity_decay: 0.002
  competence_decay: 0.001
  social_decay: 0.003
  safety_decay: 0.001
  rest_decay: 0.005

emotion_system:
  enabled: true
  pleasure_decay: 0.01
  frustration_decay: 0.02
  surprise_decay: 0.05
  fear_decay: 0.03

causal_discovery:
  enabled: true
  max_edges: 256
  min_intervention_effect: 0.01

number_sense:
  enabled: true
  max_count: 20
  hidden: 32
  lr: 3.0e-4

rule_induction:
  enabled: true
  max_rules: 128
  max_chain_depth: 5
  min_confidence: 0.3
  induction_min_positive: 3

llm_fusion:
  enabled: false

# Simple 3D curriculum: vary object count and density.
# ThreeDWorld uses the same env_id for all tasks; difficulty is
# controlled by num_objects and action_force.
curriculum:
  max_tasks: 5
  lp_window_size: 32
  lp_min_samples: 8
  exploration_epsilon: 0.1
  smoothing: 0.5
  switch_every_steps: 20000
  report_every_steps: 500
  tasks:
    - {id: 0, env_id: "ThreeDWorld", num_objects: 2, action_force: 70.0, difficulty: 0.1, tag: "3d-sparse-strong"}
    - {id: 1, env_id: "ThreeDWorld", num_objects: 5, action_force: 60.0, difficulty: 0.3, tag: "3d-some-mid"}
    - {id: 2, env_id: "ThreeDWorld", num_objects: 8, action_force: 50.0, difficulty: 0.5, tag: "3d-base-8obj"}
    - {id: 3, env_id: "ThreeDWorld", num_objects: 12, action_force: 45.0, difficulty: 0.7, tag: "3d-many-heavy"}
    - {id: 4, env_id: "ThreeDWorld", num_objects: 16, action_force: 40.0, difficulty: 0.9, tag: "3d-crowded-weak"}

skills:
  skill_d_out: 128
  skill_d_in: 128
  skill_rank: 8
  gpu_capacity: 256
  cpu_capacity: 2048
  ssd_max_shards: 64
  ssd_shard_size: 128
  merge_similarity_threshold: 0.9
  score_alpha: 1.0
  score_beta: 0.5
  score_gamma: 0.1
  archive_subdir: "skills"

world_model:
  z_dim: 32
  h_dim: 64
  embed_dim: 64
  hidden: 128
  max_rollout_steps: 10
  kl_free_nats: 1.0
  update_every_steps: 8
  lr: 3.0e-4
  wm_loss_coef: 1.0
  log_every_steps: 5000

intrinsic:
  embed_dim: 128
  lr: 1.0e-4
  reward_clip: 5.0
  reward_coef: 0.1
  update_every_steps: 1

replay:
  hot_capacity: 16384
  warm_capacity: 131072
  cold_max_shards: 32
  cold_shard_size: 16384
  per_alpha: 0.6
  min_size_to_sample: 1024
  sample_every_steps: 4
  batch_size_offpolicy: 128
  archive_subdir: "replay"

coverage:
  num_buckets: 8192
  log_every_steps: 5000

train:
  ppo_clip: 0.2
  ppo_epochs: 4
  entropy_coef: 0.01
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  total_steps: 3000000
  ckpt_every_steps: 50000

# Independent evaluator: same weights as Stage 6
independent_eval:
  eval_every_steps: 100000
  eval_weights: [2.0, 1.0, 2.0]
  episodes_per_task: 20

# Stage 7 visual monitoring: save rendered frames for live viewing
viz:
  frame_every_steps: 5000
