# Phase 9 · LLM Fusion (语言融合)
# Connects frozen Qwen-7B to trained devagi body.
# Only projectors are trained (~4.5M params). Qwen is frozen.
#
# Prerequisites: Phase 0-8 body must be trained first.
# VRAM: ~11 GB (body 5.5GB + Qwen 4-bit 5GB + projectors 0.5GB).

stage: 9
phase: 9
name: "phase9_llm_fusion"

model:
  use_hybrid_backbone: true
  hybrid_n_layers: 8
  hybrid_n_heads: 4
  hybrid_swa_window: 8
  hybrid_ttt_mini_batch: 4
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0
  hidden_size: 128
  use_slot_attention: true
  slot_num_slots: 7
  slot_dim: 128
  slot_num_iterations: 3

env:
  id: "ThreeDWorld"
  num_objects: 100
  max_episode_steps: 500
  render_size: 256
  action_force: 2.0
  developmental_age: 0.5

train:
  ppo_clip: 0.2
  ppo_epochs: 4
  entropy_coef: 0.02
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 3.0e-4
  total_steps: 3000000

llm_fusion:
  enabled: true
  model: "Qwen/Qwen2.5-7B-Instruct"
  max_new_tokens: 64
  call_interval_steps: 50

curiosity:
  enabled: true
  mode: "rssm_uncertainty"
  coef: 0.5

world_model:
  enabled: true
  embed_dim: 128
  h_dim: 128
  z_dim: 32
  hidden: 128
  max_rollout_steps: 4
  lr: 1.0e-3

replay:
  enabled: true
  capacity_gpu: 4096
  capacity_cpu: 32768
  capacity_ssd: 36864
  min_size: 256
  batch_size: 64
  per_alpha: 0.6

skills:
  enabled: true
  gpu_capacity: 256
  cpu_capacity: 2048
  cold_shard_size: 128
  cold_max_shards: 64
  merge_threshold: 0.85

number_sense:
  enabled: true
  max_count: 20
  train_every_episodes: 10
  lr: 3.0e-4

rule_induction:
  enabled: true
  max_rules: 256
  induction_every_episodes: 20

causal_discovery:
  enabled: true
  max_edges: 512
  intervene_every_steps: 500

model_growth:
  enabled: true
  max_layers: 20
  min_steps_between_growths: 100000

cross_modal:
  enabled: true
  touch_dim: 12
  train_every_steps: 1000

creativity:
  enabled: true
  trigger_every_steps: 2000
  max_ideas: 200

monitor:
  sample_interval_s: 2.0
  slope_alarm_gb_per_hour: 0.5
