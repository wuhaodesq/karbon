# Stage 6 · Perpetual (Online EWC + Sleep Consolidation + Generative Replay)
# The AGI-esque terminal stage. Adds:
#   - Online EWC: single Fisher matrix, penalizes drift from important weights.
#   - Generative Replay VAE: synthesizes past observations for rehearsal
#     instead of storing them all (Axiom 1 satisfied by fixed-size VAE).
#   - Sleep Consolidation Loop: periodic offline "night" that trims replay,
#     merges skills, and runs EWC consolidate.
#
# Exit criterion: 30 consecutive days of uninterrupted training with:
#   * VRAM slope ≈ 0 GB/h over 7-day rolling windows
#   * ≥10 tasks learned in sequence with ≤10% drop on earliest tasks

stage: 6
name: "stage6_consolidation"

model:
  use_hybrid_backbone: true
  hybrid_n_layers: 3
  hybrid_n_heads: 4
  hybrid_swa_window: 16
  hybrid_ttt_mini_batch: 8
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0

# --- Stage 6 sub-block: continual learning ---
continual:
  # Online EWC
  ewc_lambda: 1.0
  ewc_gamma: 0.95
  ewc_anchor_mode: "replace"       # "replace" or "ema"
  ewc_anchor_ema_alpha: 0.9
  # How often to run the EWC consolidate step (should align with sleep cycles)
  ewc_consolidate_every_steps: 100000
  ewc_consolidate_num_batches: 32
  ewc_batch_size: 32

  # Generative Replay VAE
  gr_enabled: true
  gr_latent_dim: 32
  gr_hidden: 128
  gr_lr: 1.0e-3
  gr_kl_weight: 1.0
  gr_update_every_steps: 16
  gr_batch_size: 32
  gr_rehearsal_batch_size: 32
  # How often to inject synthetic samples into replay for rehearsal
  gr_inject_every_steps: 5000

  # Sleep consolidation loop
  sleep_warmup_steps: 1000
  sleep_replay_trim_every: 10000
  sleep_skills_merge_every: 20000
  sleep_ttt_distill_every: 20000

# --- Prior blocks carry forward ---
curriculum:
  max_tasks: 8
  lp_window_size: 32
  lp_min_samples: 8
  exploration_epsilon: 0.1
  smoothing: 0.5
  switch_every_steps: 20000
  report_every_steps: 500
  tasks:
    - {id: 0, env_id: "MiniGrid-Empty-5x5-v0",  difficulty: 0.1, tag: "empty-5x5"}
    - {id: 1, env_id: "MiniGrid-Empty-6x6-v0",  difficulty: 0.2, tag: "empty-6x6"}
    - {id: 2, env_id: "MiniGrid-Empty-8x8-v0",  difficulty: 0.3, tag: "empty-8x8"}
    - {id: 3, env_id: "MiniGrid-DoorKey-5x5-v0", difficulty: 0.5, tag: "doorkey-5x5"}
    - {id: 4, env_id: "MiniGrid-DoorKey-6x6-v0", difficulty: 0.6, tag: "doorkey-6x6"}

skills:
  skill_d_out: 128
  skill_d_in: 128
  skill_rank: 8
  gpu_capacity: 32
  cpu_capacity: 128
  ssd_max_shards: 4
  ssd_shard_size: 32
  merge_similarity_threshold: 0.9
  score_alpha: 1.0
  score_beta: 0.5
  score_gamma: 0.1
  archive_subdir: "skills"

world_model:
  z_dim: 32
  h_dim: 64
  embed_dim: 64
  hidden: 128
  max_rollout_steps: 10
  kl_free_nats: 1.0
  update_every_steps: 8
  lr: 3.0e-4
  wm_loss_coef: 1.0
  log_every_steps: 5000

intrinsic:
  embed_dim: 128
  lr: 1.0e-4
  reward_clip: 5.0
  reward_coef: 0.1
  update_every_steps: 1

replay:
  hot_capacity: 4096
  warm_capacity: 32768
  cold_max_shards: 8
  cold_shard_size: 4096
  per_alpha: 0.6
  min_size_to_sample: 1024
  sample_every_steps: 4
  batch_size_offpolicy: 128
  archive_subdir: "replay"

coverage:
  num_buckets: 4096
  log_every_steps: 5000

train:
  ppo_clip: 0.2
  ppo_epochs: 4
  entropy_coef: 0.01
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
