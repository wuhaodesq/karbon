# Stage 6 · Perpetual (Online EWC + Generative Replay + Sleep Consolidation)
# The AGI-esque terminal stage. Adds:
#   - Online EWC: single Fisher matrix, penalizes drift from important weights.
#   - Generative Replay VAE: synthesizes past observations for rehearsal.
#   - Sleep Consolidation Loop: periodic offline "night" that trims replay,
#     merges skills, and runs EWC consolidate.
#
# ENV NOTE: continues on PhysicsSandbox (same 64x64 obs / 8-action as Stage 5)
# so the developmental chain carries forward. Resumes from the Stage-5 ckpt
# (7-layer hybrid + SlotAttention + RSSM + bounded skill library). MiniGrid is
# intentionally NOT the base env here — it is a post-Stage-6 cognitive branch
# (see ROADMAP). Switching base env to MiniGrid would break the resume (obs
# shape + layer count mismatch) and discard all accumulated developmental state.

stage: 6
name: "stage6_consolidation"

model:
  # MUST match Stage 5's hidden_size (128) so the Stage-5 ckpt weights load
  # with the correct shape. The home_64g preset sets 768, which would both
  # mismatch the ckpt AND break SlotAttention (assumes slot_dim == d_model).
  hidden_size: 128
  use_hybrid_backbone: true
  hybrid_n_layers: 7
  hybrid_n_heads: 4
  hybrid_swa_window: 16
  hybrid_ttt_mini_batch: 8
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0
  use_slot_attention: true
  slot_num_slots: 7
  slot_dim: 128
  slot_num_iterations: 3
  use_vision_encoder: false

# --- Base env: MUST match Stage 5 (PhysicsSandbox, render_size=64) so the
# Stage-5 ckpt's obs/action shapes load correctly on resume. The home_64g
# preset defaults to MiniGrid-DoorKey-8x8-v0 (obs 7x7x3) which would break
# loading. HomeostaticDrives/EmotionSystem are gated on n_envs==1, so keep
# single-env here.
env:
  id: "PhysicsSandbox"
  num_objects: 10
  max_episode_steps: 300
  render_size: 64
  gravity: -9.8
  action_force: 50.0
  num_envs: 1

# --- Stage 6 sub-block: continual learning ---
continual:
  # Online EWC
  ewc_lambda: 1.0
  ewc_gamma: 0.95
  ewc_anchor_mode: "replace"
  ewc_anchor_ema_alpha: 0.9
  ewc_consolidate_every_steps: 100000
  ewc_consolidate_num_batches: 32
  ewc_batch_size: 32

  # Generative Replay VAE
  gr_enabled: true
  gr_latent_dim: 32
  gr_hidden: 128
  gr_lr: 1.0e-3
  gr_kl_weight: 1.0
  gr_update_every_steps: 16
  gr_batch_size: 32
  gr_rehearsal_batch_size: 32
  gr_inject_every_steps: 5000

  # Sleep consolidation loop
  sleep_warmup_steps: 1000
  sleep_replay_trim_every: 10000
  sleep_skills_merge_every: 20000
  sleep_ttt_distill_every: 20000

# --- Stage 6 sub-block: Core-Knowledge P2 auxiliary loss (open-gap A#4) ---
# Soft inductive-bias losses (object permanence / intuitive physics / number
# sense) wired into the PPO total loss. Enabled for Stage 6; pairs with the P1
# demo-prefill recipe. Zero cost when no core-knowledge records accumulate.
core_knowledge_loss:
  enabled: true
  coef_object_permanence: 0.1
  coef_intuitive_physics: 0.1
  coef_number_sense: 0.1

# --- Stage 6 sub-block: Dreamer-style imagination training ---
# Path-2 completion (docs/path-to-northstar.md). The ImaginationTrainer is
# already wired into the training loop (train.py:2630, gradient flows back to
# the main model) and is merely gated by `enabled`. Flipping this on makes the
# agent train its actor-critic on RSSM-imagined rollouts — the missing piece
# for long-horizon physical planning. Bounded: fixed horizon + fixed batch.
imagination:
  enabled: true
  imagination_horizon: 8
  imagination_batch: 32
  discount: 0.99
  actor_entropy_scale: 0.01
  critic_loss_scale: 0.5
  update_every_steps: 16
  min_replay_size: 256
  lambda_gae: 0.95
  lr: 3.0e-4

# --- Stage 6 sub-block: infant-foundational drives + emotion (batch ①) ---
# Most foundational cognitive blocks (motivation + affective modulation). Open at
# Stage 6 start per ROADMAP "Stage 6 认知模块分批激活时机". Single-env only
# (gated on n_envs==1 in train.py); safe to enable.
homeostatic_drives:
  enabled: true
  curiosity_decay: 0.002
  competence_decay: 0.001
  social_decay: 0.003
  safety_decay: 0.001
  rest_decay: 0.005

emotion_system:
  enabled: true
  pleasure_decay: 0.01
  frustration_decay: 0.02
  surprise_decay: 0.05
  fear_decay: 0.03

# --- Stage 6 sub-block: implemented cognitive modules, now ACTIVATED ---
# These modules already exist and are wired into train.py; they were simply not
# switched on for Stage 6. Enabling them lets B#5 (cross-domain transfer),
# B#6 (language anchor via LLMFusion), and B#9 (interventional causal discovery)
# actually run instead of remaining dormant. Safe: each has a no-op / skip path
# when its precondition is unmet (LLMFusion needs a local frozen model file and
# auto-skips if absent; causal_discovery is throttled to every 500 steps).
causal_discovery:
  enabled: true
  max_edges: 256
  min_intervention_effect: 0.01

number_sense:
  enabled: true
  max_count: 10
  hidden: 32
  lr: 3.0e-4

rule_induction:
  enabled: true
  max_rules: 128
  max_chain_depth: 5
  min_confidence: 0.3
  induction_min_positive: 3

llm_fusion:
  enabled: true
  model: "Qwen/Qwen2.5-7B-Instruct"
  max_new_tokens: 64
  call_interval_steps: 50

# --- Prior blocks carry forward (with enlarged capacity) ---
# TASKS ARE PhysicsSandbox VARIANTS (not MiniGrid): the difficulty knobs are all
# physics params (num_objects / gravity / action_force) so obs shape stays 64x64
# and the Stage-5 resume weights remain valid. MiniGrid lives in the post-Stage-6
# cognitive branch (ROADMAP), which needs its own obs adapter.
curriculum:
  max_tasks: 8
  lp_window_size: 32
  lp_min_samples: 8
  exploration_epsilon: 0.1
  smoothing: 0.5
  switch_every_steps: 20000
  report_every_steps: 500
  tasks:
    - {id: 0, env_id: "PhysicsSandbox", num_objects: 3,  gravity: -4.0,  action_force: 70.0, difficulty: 0.1, tag: "few-light-strong"}
    - {id: 1, env_id: "PhysicsSandbox", num_objects: 5,  gravity: -6.0,  action_force: 60.0, difficulty: 0.3, tag: "some-mid"}
    - {id: 2, env_id: "PhysicsSandbox", num_objects: 10, gravity: -9.8,  action_force: 50.0, difficulty: 0.5, tag: "base-10obj"}
    - {id: 3, env_id: "PhysicsSandbox", num_objects: 14, gravity: -12.0, action_force: 45.0, difficulty: 0.7, tag: "many-heavy"}
    - {id: 4, env_id: "PhysicsSandbox", num_objects: 18, gravity: -14.0, action_force: 40.0, difficulty: 0.9, tag: "crowded-heavy-weak"}

skills:
  skill_d_out: 128
  skill_d_in: 128
  skill_rank: 8
  gpu_capacity: 256
  cpu_capacity: 2048
  ssd_max_shards: 64
  ssd_shard_size: 128
  merge_similarity_threshold: 0.9
  score_alpha: 1.0
  score_beta: 0.5
  score_gamma: 0.1
  archive_subdir: "skills"

world_model:
  z_dim: 32
  h_dim: 64
  embed_dim: 64
  hidden: 128
  max_rollout_steps: 10
  kl_free_nats: 1.0
  update_every_steps: 8
  lr: 3.0e-4
  wm_loss_coef: 1.0
  log_every_steps: 5000

intrinsic:
  embed_dim: 128
  lr: 1.0e-4
  reward_clip: 5.0
  reward_coef: 0.1
  update_every_steps: 1

replay:
  hot_capacity: 16384
  warm_capacity: 131072
  cold_max_shards: 32
  cold_shard_size: 16384
  per_alpha: 0.6
  min_size_to_sample: 1024
  sample_every_steps: 4
  batch_size_offpolicy: 128
  archive_subdir: "replay"

coverage:
  num_buckets: 4096
  log_every_steps: 5000

train:
  ppo_clip: 0.2
  ppo_epochs: 4
  entropy_coef: 0.01
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  total_steps: 5000000
