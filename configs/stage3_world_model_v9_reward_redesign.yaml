# Stage 3 · World Model (v9 — reward redesign to break local-optimum trap)
# v1-v8 all plateau at ~101-102 (peaks ~106 transient). Root cause identified:
# PhysicsSandbox._compute_reward gave speed*0.05 to EVERY object unconditionally,
# so passive inertia/collisions "white-gift" return and the agent gets stuck in a
# local optimum ("nudge a few objects", ~0.33/step instead of the ~2.0/step cap).
# v9 redesigns the reward (src/envs/physics_sandbox.py _compute_reward):
#   * remove unconditional speed reward
#   * reward ONLY agent-caused acceleration (|Δv|) while in contact with object
#     -> agent must actively push objects to earn speed reward
#   * raise contact reward 0.1->0.15 and per-step cap 2.0->3.0 (higher ceiling)
# Tests whether reshaping the reward landscape (not architecture/optimization)
# lifts the ~101 steady-state to the 106 transient (or higher).
# Same 7-layer + RSSM + imagination(fixed reward) as v6; no MCTS planner (isolate
# the reward variable). Resume v6 ckpt (WM reward head re-adapts to new reward).

stage: 3
name: "stage3_world_model_v9_reward_redesign"

env:
  id: "PhysicsSandbox"
  num_objects: 10
  max_episode_steps: 300
  render_size: 64
  gravity: -9.8
  action_force: 50.0

model:
  use_hybrid_backbone: true
  hidden_size: 128
  hybrid_n_layers: 7
  hybrid_n_heads: 4
  hybrid_swa_window: 16
  hybrid_ttt_mini_batch: 8
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0
  use_slot_attention: true
  slot_num_slots: 7
  slot_dim: 128
  slot_num_iterations: 3
  use_vision_encoder: false

world_model:
  z_dim: 32
  h_dim: 64
  embed_dim: 64
  hidden: 128
  max_rollout_steps: 10
  kl_free_nats: 1.0
  update_every_steps: 8
  lr: 3.0e-4
  wm_loss_coef: 1.0
  log_every_steps: 5000

curiosity:
  mode: "rssm_uncertainty"
  coef: 0.3

imagination:
  enabled: true
  imagination_horizon: 8
  imagination_batch: 32
  discount: 0.99
  actor_entropy_scale: 0.01
  critic_loss_scale: 0.5
  update_every_steps: 16
  min_replay_size: 256
  lambda_gae: 0.95
  lr: 3.0e-4

model_growth:
  enabled: false

# No planner for v9: isolate the reward-redesign variable (planner tested in v8).

intrinsic:
  embed_dim: 128
  lr: 1.0e-4
  reward_clip: 5.0
  reward_coef: 0.1
  update_every_steps: 1

replay:
  hot_capacity: 4096
  warm_capacity: 32728
  cold_max_shards: 8
  cold_shard_size: 4096
  per_alpha: 0.6
  min_size_to_sample: 1024
  sample_every_steps: 4
  batch_size_offpolicy: 128
  archive_subdir: "replay"

coverage:
  num_buckets: 4096
  log_every_steps: 5000

train:
  total_steps: 5000000
  ppo_clip: 0.2
  ppo_epochs: 4
  entropy_coef: 0.01
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
