# Stage 3 · World Model (v5 — WIDER backbone test, Option A)
# Hypothesis: the ~101-102 ceiling on PhysicsSandbox is a capacity/return-estimation
# precision limit of the d_model=128 hybrid backbone, NOT a layer-count or
# world-model limit (v1-v4 all plateau there regardless of WM/imagination/layers).
# v5 widens the backbone d_model 128 -> 256 (fresh start, 7 layers, no growth) to
# test whether a wider network can hold the transient 105+ as a STABLE plateau.
# Quick short-run to validate the hypothesis before investing in a widen-capable
# ModelGrowerV2. Same WM (RSSM + imagination) + env as v4.

stage: 3
name: "stage3_world_model_v5_wide"

env:
  id: "PhysicsSandbox"
  num_objects: 10
  max_episode_steps: 300
  render_size: 64
  gravity: -9.8
  action_force: 50.0

model:
  use_hybrid_backbone: true
  hidden_size: 256
  hybrid_n_layers: 7
  hybrid_n_heads: 8
  hybrid_swa_window: 16
  hybrid_ttt_mini_batch: 8
  hybrid_ffn_hidden_mult: 4
  hybrid_dropout: 0.0
  use_slot_attention: true
  slot_num_slots: 7
  slot_dim: 256
  slot_num_iterations: 3
  use_vision_encoder: false

# --- Stage 3 sub-block: world model ---
world_model:
  z_dim: 32
  h_dim: 64
  embed_dim: 64
  hidden: 128
  max_rollout_steps: 10
  kl_free_nats: 1.0
  update_every_steps: 8
  lr: 3.0e-4
  wm_loss_coef: 1.0
  log_every_steps: 5000

curiosity:
  mode: "rssm_uncertainty"
  coef: 0.3

imagination:
  enabled: true
  imagination_horizon: 8
  imagination_batch: 32
  discount: 0.99
  actor_entropy_scale: 0.01
  critic_loss_scale: 0.5
  update_every_steps: 16
  min_replay_size: 256
  lambda_gae: 0.95
  lr: 3.0e-4

# No growth for v5: fresh wide 7-layer model (directly tests width, not depth).
model_growth:
  enabled: false

# --- Stage 1 / 2 blocks carry forward ---
intrinsic:
  embed_dim: 128
  lr: 1.0e-4
  reward_clip: 5.0
  reward_coef: 0.1
  update_every_steps: 1

replay:
  hot_capacity: 4096
  warm_capacity: 32728
  cold_max_shards: 8
  cold_shard_size: 4096
  per_alpha: 0.6
  min_size_to_sample: 1024
  sample_every_steps: 4
  batch_size_offpolicy: 128
  archive_subdir: "replay"

coverage:
  num_buckets: 4096
  log_every_steps: 5000

train:
  total_steps: 800000
  ppo_clip: 0.2
  ppo_epochs: 4
  entropy_coef: 0.01
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
